<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img class="background" src="images/background.jpg">

    <header id="entete">
        <div class="logo"></div>
        <nav>
            <ul class="menu">
                <li><a href="#Home" class="home"> Home</a></li>
                <li><a href="#About" class="about">About</a></li>
                <li><a href="#Contact" class="contact">Contact</a></li>
                <li><a href="#Register" class="register">Register</a></li>
            </ul>
        </nav>
    </header>

    <section id="Register">

    </section>

    <div class="container">
        <p class="signUp">Sign Up</p>
        <p class="logInLink">Already a member? <a href="logIn.html" class="link">Log in</a></p>

        <label class="email">Email</label>
        <input id="email-input" type="text" class="email-input" placeholder="Email">

        <label class="password">Password</label>
        <input id="password-input" type="password" class="password-input" placeholder="Password">

        <button class="btn-login">LOGIN</button>

        <div class="logos">
            <img src="images/instagram.png" class="instagram">
            <img src="images/pinterest.png" class="pinterest">
            <img src="images/linkedIn.png" class="linkedIn">
        </div>
    </div>

    <section class="second">   
        <div class="section2">
            <img src="images/pfpPic.jpg" class="pfpPic"> 
            <div class="blur">
                <img src="images/background.jpg" class="section2-background">
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
